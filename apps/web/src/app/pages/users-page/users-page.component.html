<header class="page-toolbar">
  <div class="toolbar-content">
    <div class="toolbar-copy">
      <span class="toolbar-title">Users</span>
      <span class="toolbar-subtitle">Add, edit, view, and delete users via modal.</span>
    </div>

    <span class="toolbar-spacer"></span>

    <button tuiButton size="s" type="button" (click)="openAdd()">Add User</button>
    <button tuiButton size="s" appearance="outline" type="button" (click)="handleLogout()">
      Logout
    </button>
  </div>
</header>

<main class="page">
  <a routerLink="/" class="back-link">
    <span aria-hidden="true">&larr;</span>
    Back to Landing Page
  </a>

  <section class="filters-card" aria-label="User filters">
    <div class="filters-row">
      <tui-textfield class="filter-field">
        <label tuiLabel>Search by name or country</label>
        <input
          tuiInput
          type="text"
          [ngModel]="searchTerm"
          (ngModelChange)="handleSearchChange($event)"
        />
      </tui-textfield>

      <tui-textfield class="filter-field">
        <label tuiLabel>Gender</label>
        <select
          tuiSelect
          [items]="genderValues"
          [labels]="genderLabels"
          [ngModel]="genderFilter"
          (ngModelChange)="handleGenderChange($event)"
        ></select>
      </tui-textfield>
    </div>
  </section>

  <app-user-dialog
    [visible]="dialogVisible()"
    [mode]="dialogMode()"
    [user]="selectedUser()"
    [saving]="savingUser()"
    (close)="handleClose()"
    (save)="handleSave($event)"
  ></app-user-dialog>

  <app-confirm-dialog
    [visible]="confirmDeleteVisible()"
    title="Confirm delete"
    confirmLabel="Delete"
    [message]="'Delete ' + (userPendingDelete()?.name ?? 'this user') + '?'"
    (cancel)="cancelDelete()"
    (confirm)="confirmDelete()"
  />

  <section class="table-card">
    @if (loading()) {
      <div class="loading-card">
        <tui-loader size="m" />
        <span>Loading users...</span>
      </div>
    } @else {
      <app-user-table
        [users]="users()"
        [first]="first"
        [totalRecords]="total()"
        [pageSize]="pageSize"
        (view)="openView($event)"
        (edit)="openEdit($event)"
        (remove)="handleDelete($event)"
        (pageChange)="handlePageChange($event)"
      />
    }
  </section>
</main>
